name: Debug Wheel Build

on:
  workflow_dispatch:

jobs:
  debug-cffi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download cffi source
        run: |
          pip download --no-binary :all: --no-deps "cffi==1.17.1" -d ./src_pkg
          cd src_pkg
          find . -name "*.tar.gz" -exec tar -xzf {} \;
          PKG_DIR=$(find . \( -name "pyproject.toml" -o -name "setup.py" \) | head -1 | xargs dirname | sed 's|^\./||')
          echo "PKG_DIR=$PKG_DIR" >> $GITHUB_ENV
          echo "=== Source files ==="
          ls -la src_pkg/$PKG_DIR/

      - name: Try manual build first
        run: |
          pip install build
          cd src_pkg/${{ env.PKG_DIR }}
          python -m build --wheel 2>&1 | tee /tmp/manual_build.log || true
          echo "=== Manual build result ==="
          find dist -name "*.whl" 2>/dev/null || echo "No wheel in dist"

      - name: Build with cibuildwheel
        uses: pypa/cibuildwheel@v3.3.1
        with:
          package-dir: ./src_pkg/${{ env.PKG_DIR }}
          output-dir: wheelhouse
        env:
          CIBW_PLATFORM: android
          CIBW_ARCHS_ANDROID: arm64_v8a
          CIBW_BUILD_FRONTEND: "build"
          CIBW_BUILD_VERBOSITY: 3
          CIBW_ENVIRONMENT: "ANDROID_API_LEVEL=24"
          CIBW_BEFORE_ALL: "apt-get install -y libffi-dev || true"
          CIBW_BEFORE_BUILD: "pip install pycparser && python setup.py --version"
        continue-on-error: true

      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs
          path: |
            /tmp/manual_build.log
            /tmp/cibw-*.log
          if-no-files-found: warn

  debug-numpy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download numpy source
        run: |
          pip download --no-binary :all: --no-deps "numpy==1.26.4" -d ./src_pkg
          cd src_pkg
          find . -name "*.tar.gz" -exec tar -xzf {} \;
          PKG_DIR=$(find . \( -name "pyproject.toml" -o -name "setup.py" \) | head -1 | xargs dirname | sed 's|^\./||')
          echo "PKG_DIR=$PKG_DIR" >> $GITHUB_ENV
          echo "=== Source files ==="
          ls -la src_pkg/$PKG_DIR/

      - name: Check numpy build system
        run: |
          cd src_pkg/${{ env.PKG_DIR }}
          cat pyproject.toml | head -50 || cat setup.py | head -50 || true
          echo "=== C files ==="
          find . -name "*.c" | head -10

      - name: Build with cibuildwheel
        uses: pypa/cibuildwheel@v3.3.1
        with:
          package-dir: ./src_pkg/${{ env.PKG_DIR }}
          output-dir: wheelhouse
        env:
          CIBW_PLATFORM: android
          CIBW_ARCHS_ANDROID: arm64_v8a
          CIBW_BUILD_FRONTEND: "build"
          CIBW_BUILD_VERBOSITY: 3
          CIBW_ENVIRONMENT: "ANDROID_API_LEVEL=24 NPY_BLAS_ORDER= NPY_LAPACK_ORDER="
          CIBW_BEFORE_BUILD: "pip install meson-python ninja patchelf Cython"
        continue-on-error: true
