name: Build Android ARM64 Wheels

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: "regex", version: "2024.11.6" }
          - { name: "lru-dict", version: "1.3.0" }
          - { name: "zstandard", version: "0.23.0" }
          - { name: "ujson", version: "5.10.0" }

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download source
        run: |
          pip download --no-binary :all: --no-deps \
            "${{ matrix.name }}==${{ matrix.version }}" -d ./src_pkg
          find ./src_pkg -name "*.tar.gz" -exec tar -xzf {} -C ./src_pkg \;
          find ./src_pkg -name "*.zip" -exec unzip -q {} -d ./src_pkg \;
          PKG_DIR=$(find ./src_pkg -maxdepth 1 -mindepth 1 -type d | head -1)
          echo "PKG_DIR=$PKG_DIR" >> $GITHUB_ENV

      - name: Build wheel
        uses: pypa/cibuildwheel@v3.3.1
        with:
          package-dir: ${{ env.PKG_DIR }}
          output-dir: wheelhouse
        env:
          CIBW_PLATFORM: android
          CIBW_ARCHS_ANDROID: arm64_v8a
          CIBW_BUILD_FRONTEND: "build"
          CIBW_ENVIRONMENT: "ANDROID_API_LEVEL=24"

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.name }}
          path: wheelhouse/*.whl
          if-no-files-found: warn
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: all-wheels
          merge-multiple: true

      - name: List wheels
        run: |
          find all-wheels -name "*.whl" | sort
          echo "Total: $(find all-wheels -name '*.whl' | wc -l)"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: wheels-${{ github.run_number }}
          name: "Android ARM64 Wheels (build #${{ github.run_number }})"
          files: all-wheels/**/*.whl
          fail_on_unmatched_files: false
          body: |
            ## net
            da

            | Пакет | Версия |
            |-------|--------|
            | regex | 2024.11.6 |
            | lru-dict | 1.3.0 |
            | zstandard | 0.23.0 |
            | ujson | 5.10.0 |

            ### net
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
