name: Build Android ARM64 Wheels

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - "numpy"
          - "regex"
          - "ujson"
          - "orjson"
          - "cryptography"
          - "cffi"
          - "zstandard"
          - "lru-dict"
          - "mutagen"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chaquopy buildwheel
        run: |
          pip install chaquopy

      - name: Build wheel for Android ARM64
        run: |
          python -m chaquopy.buildwheel \
            --python 3.11 \
            --abi arm64-v8a \
            ${{ matrix.package }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.package }}
          path: "*.whl"
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: all-wheels
          merge-multiple: true

      - name: List wheels
        run: find all-wheels -name "*.whl" | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: wheels-${{ github.run_number }}
          name: Android ARM64 Wheels (build ${{ github.run_number }})
          files: all-wheels/**/*.whl
          body: |
            Android ARM64 wheels для Exteragram плагинов.
            Платформа: `android_24_arm64_v8a`, Python `3.11`

            ### Использование:
            ```python
            from mandre_lib import MandreInstall
            MandreInstall("https://github.com/НИК/РЕПО/releases/download/wheels-${{ github.run_number }}/ФАЙЛ.whl")
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
